<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img id="logoGif" src="./assets/LOGO_Cash.gif" alt="logo_conversion_gif">
    </header>
    
    <div id="conversorBox">
        <section>
            <label> Converter <b>de</b>
                <select id="de">
                    <option value="U$">U$ Dolar</option>
                    <option value="€">€ Euro</option>
                    <option value="£">£ Libra</option>
                    <option value="₿">₿ Bitcoin</option>
                    <option value="R$">R$ Real</option>
                </select>
            </label>

            <label> Converter <b>para</b>
                <select id="para">
                <option value="U$">U$ Dolar</option>
                <option value="€">€ Euro</option>
                <option value="£">£ Libra</option>
                <option value="₿">₿ Bitcoin</option>
                <option value="R$">R$ Real</option>
                </select>
            </label>

            <label> Valor
                <input class="getValue" placeholder="U$ 10.000,00"></input>
            </label>

            <button onclick="convert()">Converter</button>
        </section>

        <section id="conversionBox">
            <div>
                <img class="coinLogo moedaAConverter" id="aConverter" src="./assets/Real_Logo.png" alt="dolar_logo">
                <p class="moedaAConverter" id="moedaAConverter">Real</p>
                <p id="valorAConverter">R$ 0,00</p>
            </div>

            <img id="seta" src="./assets/Arrow.png" alt="seta">

            <div>
                <img class="coinLogo moedaConversora" id="conversora" src="./assets/Dolar_Logo.png" alt=  "euro_logo">
                <p class="moedaConversora" id="moedaConversora">Dolar</p>
                <p id="valorConvertido">U$ 0,00</p>
            </div>   
            </section>
    </div>

    <script src="./scrip.js"></script>
</body>
</html>
